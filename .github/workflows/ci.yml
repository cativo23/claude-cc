name: CI

on:
  push:
    branches: [main, develop, feat/*]
  pull_request:
    branches: [develop, main]

# Defense-in-depth: explicit read-only token. CI doesn't write to the repo,
# release.yml is the only workflow that needs contents:write / id-token:write.
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      # Coverage thresholds enforced via vitest.config.ts. A drop below
      # the configured floors (lines 87, statements 85, branches 75,
      # functions 80) fails this step.
      - run: npm run test:coverage
      - run: npm run lint
      - run: npm run build
      # Bundle size guard: dist/ ships to npm. Currently ~280 KB; the
      # ceiling is set to 350 KB so meaningful growth is a deliberate
      # decision rather than accidental. Raise alongside the corresponding
      # PR if a feature genuinely needs the headroom.
      - name: Bundle size guard
        env:
          CEILING: '358400'
        run: |
          SIZE=$(du -sb dist/ | cut -f1)
          echo "dist/ size: $SIZE bytes (ceiling: $CEILING)"
          if [ "$SIZE" -gt "$CEILING" ]; then
            echo "::error::dist/ exceeded ceiling — raise it in ci.yml if intentional"
            exit 1
          fi
      # Theme contrast guard. Reads compiled THEMES from dist/, computes
      # WCAG relative-luminance contrast for every powerline cell against
      # its declared fg, fails the build if any cell drops below 4.5:1
      # (AA for normal text). Catches contributor PRs that submit a brand
      # palette where white-on-bg becomes unreadable.
      - name: Theme contrast guard (WCAG AA)
        run: node scripts/validate-themes.mjs
